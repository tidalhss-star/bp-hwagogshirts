<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: 'Pretendard', 'Noto Sans KR', system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a1a; background: #fafaf8; overflow-x: hidden; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* Header & Navigation */
header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(250,250,248,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.04); transition: all 0.3s ease; }
header .container { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.logo { display: flex; align-items: center; gap: 8px; font-size: 1.4rem; font-weight: 700; color: #1a1a1a; text-decoration: none; letter-spacing: -0.5px; }
.logo span { color: #6b7b4e; }
nav ul { display: flex; list-style: none; gap: 32px; align-items: center; }
nav a { text-decoration: none; color: #555; font-size: 0.95rem; font-weight: 500; position: relative; padding: 4px 0; transition: color 0.3s; }
nav a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: #6b7b4e; transition: width 0.3s cubic-bezier(0.4,0,0.2,1); }
nav a:hover { color: #6b7b4e; }
nav a:hover::after { width: 100%; }
.nav-phone { display: flex; align-items: center; gap: 6px; color: #6b7b4e; font-weight: 600; font-size: 0.95rem; text-decoration: none; white-space: nowrap; }

/* Hamburger Menu */
.hamburger-menu { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; z-index: 1001; background: none; border: none; }
.hamburger-menu span { display: block; width: 24px; height: 2px; background: #1a1a1a; border-radius: 2px; transition: all 0.3s ease; }

/* Hero Section */
.hero-about { padding: 120px 0 80px; text-align: center; background: linear-gradient(180deg, #fafaf8 0%, #f2f3ee 100%); }
.hero-tag { display: inline-block; padding: 6px 18px; background: rgba(107,123,78,0.08); color: #6b7b4e; border-radius: 100px; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 20px; }
.hero-about h1 { font-size: 2.8rem; font-weight: 800; line-height: 1.3; letter-spacing: -1px; margin-bottom: 16px; }
.hero-about p { font-size: 1.15rem; color: #666; max-width: 640px; margin: 0 auto 32px; line-height: 1.7; }
.hero-stats { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; margin-top: 24px; }
.stat-item { text-align: center; }
.stat-number { font-size: 2.2rem; font-weight: 800; color: #6b7b4e; letter-spacing: -1px; }
.stat-label { font-size: 0.9rem; color: #888; margin-top: 4px; }

/* Section Titles */
.section-title { text-align: center; margin-bottom: 56px; }
.section-title h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.section-title .underline { display: inline-block; width: 40px; height: 3px; background: #6b7b4e; border-radius: 2px; }
.section-title p { color: #777; margin-top: 12px; font-size: 0.95rem; }

/* Story Section */
.story-section { padding: 80px 0; background: #fff; }
.story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
.story-image-wrap { position: relative; border-radius: 16px; overflow: hidden; aspect-ratio: 4/3; background: #e8ebe0; }
.story-image-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #dce2cf 0%, #c5cfa8 100%); color: #fff; font-size: 3rem; font-weight: 300; }
.story-text h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
.story-text p { color: #555; margin-bottom: 12px; line-height: 1.8; }
.story-signature { display: inline-block; margin-top: 16px; font-style: italic; color: #6b7b4e; font-weight: 600; font-size: 1.1rem; }

/* Team Section */
.team-section { padding: 80px 0; background: #fafaf8; }
.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
.team-card { background: #fff; border-radius: 16px; padding: 32px 24px; text-align: center; border: 1px solid rgba(0,0,0,0.04); transition: transform 0.3s, box-shadow 0.3s; }
.team-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.06); }
.team-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #dce2cf 0%, #b7c39e 100%); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.6rem; font-weight: 300; }
.team-card h4 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
.team-role { font-size: 0.85rem; color: #6b7b4e; font-weight: 600; margin-bottom: 10px; }
.team-desc { font-size: 0.9rem; color: #777; line-height: 1.6; }

/* Differentiation Section */
.diff-section { padding: 80px 0; background: #fff; }
.diff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.diff-card { padding: 36px 28px; border-radius: 16px; background: #fafaf8; border: 1px solid rgba(0,0,0,0.03); transition: all 0.3s; }
.diff-card:hover { background: #f2f3ee; }
.diff-icon { font-size: 2rem; margin-bottom: 12px; }
.diff-card h4 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.3px; }
.diff-card p { color: #666; font-size: 0.95rem; line-height: 1.7; }

/* CTA Banner */
.cta-banner { padding: 64px 0; background: linear-gradient(135deg, #6b7b4e 0%, #5a6a3e 100%); text-align: center; color: #fff; border-radius: 20px; margin: 60px auto; max-width: 1000px; }
.cta-banner h3 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
.cta-banner p { opacity: 0.9; margin-bottom: 24px; }
.cta-btn { display: inline-block; padding: 14px 36px; background: #fff; color: #5a6a3e; font-weight: 700; border-radius: 100px; text-decoration: none; font-size: 1rem; transition: all 0.3s; }
.cta-btn:hover { background: #f2f5e8; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

/* Footer */
footer { background: #1a1a1a; color: #aaa; padding: 40px 0; text-align: center; font-size: 0.85rem; }
footer .container p { margin: 4px 0; }
.footer-brand { color: #c5cfa8; font-weight: 600; }

/* Responsive: 768px */
@media (max-width: 768px) {
    .hamburger-menu { display: flex; }
    nav { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: #fff; padding: 80px 32px 32px; transition: right 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: -4px 0 24px rgba(0,0,0,0.08); }
    nav.nav-open { right: 0; }
    nav ul { flex-direction: column; gap: 24px; align-items: flex-start; }
    nav a { font-size: 1.1rem; }
    .nav-phone { margin-top: 16px; }
    .hero-about h1 { font-size: 2rem; }
    .hero-stats { gap: 32px; }
    .stat-number { font-size: 1.6rem; }
    .story-grid { grid-template-columns: 1fr; gap: 32px; }
    .team-grid { grid-template-columns: 1fr; }
    .diff-grid { grid-template-columns: 1fr; }
    .cta-banner { margin: 40px 16px; padding: 40px 24px; }
    .cta-banner h3 { font-size: 1.4rem; }
}
@media (max-width: 480px) {
    .hero-about h1 { font-size: 1.6rem; }
    .hero-stats { gap: 20px; }
    .stat-number { font-size: 1.4rem; }
}
</style>
